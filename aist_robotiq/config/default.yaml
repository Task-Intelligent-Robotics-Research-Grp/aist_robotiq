####################
#  Robotiq 2F-140  #
####################
robotiq_140_driver:
  ros__parameters:
    ip:             10.66.171.40  # for tcp/urcap drivers
    dev:            /dev/ttyUSB0  # for rtu drivers
    slave_ids:      [9]           # list of slave IDs of Modbus devices
    arg3f_grippers: [False]

robotiq_140_controller:
  ros__parameters:
    slave_id: 9
    joints:   [robotiq_140_finger_joint]

    # Gap width between fingers in meters [0.000, 0.140]
    min_gap: [0.000]
    max_gap: [0.140]

    # Gripper position in radians [0.69, 0,00]
    min_position: [0.69]
    max_position: [0.00]

    # Gripper velocity in m/s [0.030, 0.250]
    min_velocity: [0.030]
    max_velocity: [0.250]

    # Gripper effort in N. [0.0, 125.0]
    min_effort: [  0.0]
    max_effort: [125.0]

