################
#  Robotiq 3F  #
################
robotiq_3f_driver:
  ros__parameters:
    ip:             192.168.1.11  # for tcp/urcap drivers
    dev:            /dev/ttyUSB0  # for rtu drivers
    slave_ids:      [9]           # list of slave IDs of Modbus devices
    arg3f_grippers: [True]

robotiq_3f_controller:
  ros__parameters:
    slave_id:  9
    joints:
      - robotiq_3f_middle_finger_joint
      - robotiq_3f_left_finger_joint
      - robotiq_3f_right_finger_joint
      - robotiq_3f_scissor_joint

    # Gap width between fingers in meters [-0.2169, 0.167]
    min_gap: [-0.2169, -0.2169, -0.2169, 0.0000]
    max_gap: [ 0.1670,  0.1670,  0.1670, 0.1150]

    # Gripper position in radians [120(deg), 0(deg)]
    min_position: [2.0944, 2.0944, 2.0944,  0.1600]
    max_position: [0.0000, 0.0000, 0.0000, -0.2500]

    # Gripper velocity in m/s
    min_velocity: [0.020, 0.020, 0.020, 0.020]
    max_velocity: [0.110, 0.110, 0.110, 0.110]

    # Gripper effort in N. [0.0, 185.0]
    min_effort: [ 0.0,  0.0,  0.0,  0.0]
    max_effort: [60.0, 60.0, 60.0, 60.0]

