name: ROS build workflow

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      ros_distro:
        required: true
        type: string

jobs:
  ros_build:
    runs-on: ${{ inputs.os }}
    env:
      WS: /home/runner/work/ros2_ws
    steps:
    - uses: actions/checkout@v4
      with:
        path: aist_robotiq

    - name: Setup ROS
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ inputs.ros_distro }}

    - name: apt update and upgrade
      run: |
        sudo apt update
        sudo apt upgrade -y

    - name: Install dependencies
      run: |
        sudo apt install nlohmann-json3-dev
        sudo apt install python3-rosdoc2

    - name: Checkout dependencies
      run: |
        vcs import . --input=aist_robotiq/dependencies.repos

    - name: Init workspace
      run: |
        mkdir ${WS}
        ln -s ${GITHUB_WORKSPACE} ${WS}/src

    - name: Pre build
      run: |
        source /opt/ros/${{ inputs.ros_distro }}/setup.bash
        cd ${WS}/src
        rosdep update
        rosdep install -iy --from-paths ./

    - name: Build
      run: |
        source /opt/ros/${{ inputs.ros_distro }}/setup.bash
        cd ${WS}
        colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=Release

    - name: Install doxyfilter_python
      run: |
        sudo install ./doxyfilter_python/doxyfilter_python.py /usr/local/bin

    - name: Build documents of aist_robotiq
      run: |
        cd ${WS}/src/aist_robotiq
        doxygen

    - name: Build documents of aist_robotiq_msgs
      run: |
        cd ${WS}/src/aist_robotiq/docs
        rosdoc2 build --package-path ../aist_robotiq_msgs
        mv ./docs_output/aist_robotiq_msgs ./html

    - name: Upload artifact of aist_robotiq
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./aist_robotiq/docs/html

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

permissions:
  contents: read
  pages: write
  id-token: write
