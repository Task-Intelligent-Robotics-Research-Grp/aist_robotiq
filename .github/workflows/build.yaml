name: ROS build workflow

# on: [push]
on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      ros_distro:
        required: true
        type: string

jobs:
  ros_build:
    runs-on: ${{ inputs.os }}
    env:
      WS: /home/runner/work/ros2_ws
    steps:
    - uses: actions/checkout@v4
      with:
        path: aist_robotiq

    - name: Setup ROS
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: ${{ inputs.ros_distro }}

    - name: apt update and upgrade
      run: |
        sudo apt update
        sudo apt upgrade -y

    - name: Install dependencies
      run: |
        sudo apt install nlohmann-json3-dev

    # - name: checkout ddynamic_reconfigure2
    #   uses: actions/checkout@v4
    #   with:
    #     repository: Automation-Research-Team/ddynamic_reconfigure2
    #     path: ddynamic_reconfigure2

    # - name: Checkout srv_and_action_wrappers
    #   uses: actions/checkout@v4
    #   with:
    #     repository: Task-Intelligent-Robotics-Research-Grp/srv_and_action_wrappers
    #     path: srv_and_action_wrappers

    - name: Checkout dependencies
      run: |
        vcs import . --input=aist_robotiq/dependencies.repos

    - name: Init workspace
      run: |
        mkdir ${WS}
        ln -s ${GITHUB_WORKSPACE} ${WS}/src

    - name: pre build
      run: |
        source /opt/ros/${{ inputs.ros_distro }}/setup.bash
        cd ${WS}/src
        rosdep update
        rosdep install -iy --from-paths ./

    - name: build
      run: |
        source /opt/ros/${{ inputs.ros_distro }}/setup.bash
        cd ${WS}
        colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=Release
