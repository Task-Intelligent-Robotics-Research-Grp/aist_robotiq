name: ROS build workflow

on:
  push:
    branches:
    - develop

jobs:
  ros_build:
    runs-on: ubuntu-24.04
    env:
      WS: /home/runner/work/ros2_ws
    steps:
    - uses: actions/checkout@v4
      with:
        path: aist_robotiq

    - name: Setup ROS
      uses: ros-tooling/setup-ros@v0.7
      with:
        required-ros-distributions: jazzy

    - name: apt update and upgrade
      run: |
        sudo apt update
        sudo apt upgrade -y

    - name: Install dependencies
      run: |
        sudo apt install nlohmann-json3-dev
        sudo apt install python3-rosdoc2

    # - name: checkout ddynamic_reconfigure2
    #   uses: actions/checkout@v4
    #   with:
    #     repository: Automation-Research-Team/ddynamic_reconfigure2
    #     path: ddynamic_reconfigure2

    # - name: Checkout srv_and_action_wrappers
    #   uses: actions/checkout@v4
    #   with:
    #     repository: Task-Intelligent-Robotics-Research-Grp/srv_and_action_wrappers
    #     path: srv_and_action_wrappers

    - name: Checkout dependencies
      run: |
        vcs import . --input=aist_robotiq/dependencies.repos

    - name: Init workspace
      run: |
        mkdir ${WS}
        ln -s ${GITHUB_WORKSPACE} ${WS}/src

    - name: Pre build
      run: |
        source /opt/ros/jazzy/setup.bash
        cd ${WS}/src
        rosdep update
        rosdep install -iy --from-paths ./

    - name: Build
      run: |
        source /opt/ros/jazzy/setup.bash
        cd ${WS}
        colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=Release

    - name: Build documents of aist_robotiq
      run: |
        cd ${WS}/src/aist_robotiq
        doxygen

    - name: Build documents of aist_robotiq_msgs
      run: |
        cd ${WS}/src/aist_robotiq/docs
        rosdoc2 build --package-path ../aist_robotiq/aist_robotiq_msgs
        mv docs_output/aist_robotiq_msgs html

    - name: Upload artifact of aist_robotiq
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./docs/html

    # - name: Upload artifact of aist_robotiq_msgs
    #   uses: actions/upload-pages-artifact@v4
    #   with:
    #     path: ./docs/docs_output/aist_robotiq_msgs

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

permissions:
  contents: write
  pages: write
  id-token: write
